<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Feed Vanisher</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo">🚫</div>
    <div class="header-text">
      <h1>LinkedIn Feed Vanisher</h1>
      <p>Stay focused on what matters</p>
    </div>
  </header>

  <main>
    <div class="toggle-row">
      <div class="toggle-label">
        <span>Hide the feed</span>
        <span>Remove LinkedIn's news feed</span>
      </div>
      <label class="switch" aria-label="Toggle feed visibility">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-badge vanished" id="statusBadge">
      <div class="dot"></div>
      <span id="statusText">Feed is hidden</span>
    </div>
  </main>

  <footer>
    <a href="https://github.com/ajw170/LinkedIn-Feed-Vanisher" target="_blank">
      View on GitHub
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
